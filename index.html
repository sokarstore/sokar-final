<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS4Sokar Host | GoldHEN & Payloads</title>
  <style>
    :root {
      --gold: #ffcc55;
      --glass: rgba(0, 0, 0, 0.88);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: url('sokar-logo.png') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); z-index: -1;
    }

    header { text-align: center; padding: 20px; }
    .brand-title { font-size: 2.5rem; font-weight: 900; color: var(--gold); text-shadow: 2px 2px 10px #000; }

    .ip-box {
      background: var(--gold);
      padding: 15px;
      border-radius: 20px;
      margin: 10px 0;
      color: #000;
      font-weight: bold;
      text-align: center;
    }

    .ip-box input {
      padding: 8px;
      border-radius: 10px;
      border: none;
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      width: 160px;
    }

    .container {
      max-width: 900px;
      width: 95%;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid var(--gold);
      border-radius: 30px;
      padding: 25px;
      margin-bottom: 30px;
    }

    .status-area {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 20px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      color: var(--gold);
      min-height: 50px;
    }

    .section-title { border-right: 4px solid var(--gold); padding-right: 15px; margin: 20px 0; font-size: 1.2rem; }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .btn {
      background: #111;
      border: 1px solid #444;
      color: white;
      padding: 15px 5px;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    /* تأثير عند الضغط */
    .btn:active {
      transform: scale(0.95);
      background: var(--gold);
      color: #000;
    }

    .btn:hover { border-color: var(--gold); }

    .btn-goldhen { border: 2px solid var(--gold); background: rgba(255, 204, 85, 0.1); }

    .log-success { color: #00ff00; }
    .log-error { color: #ff3333; }
  </style>
</head>
<body>

  <header>
    <div class="brand-title">PS4Sokar</div>
    <div class="ip-box">
      أدخل IP الـ PS4: 
      <input type="text" id="ps4_ip" value="192.168.1.100">
    </div>
  </header>

  <div class="container">
    <div id="status" class="status-area">جاهز.. تأكد من فتح BinLoader في جهازك أولاً</div>

    <h2 class="section-title">إصدارات GoldHEN (11.00)</h2>
    <div class="grid-container">
      <button class="btn btn-goldhen" onclick="sendPayload('goldhen_2.4b16.bin')">GoldHEN v2.4b16</button>
      <button class="btn btn-goldhen" onclick="sendPayload('goldhen_2.3.bin')">GoldHEN v2.3</button>
    </div>

    <h2 class="section-title">أدوات النظام</h2>
    <div class="grid-container">
      <button class="btn" onclick="sendPayload('ftp.bin')">تشغيل FTP</button>
      <button class="btn" onclick="sendPayload('disable_updates.bin')">إيقاف التحديثات</button>
      <button class="btn" onclick="sendPayload('app2usb.bin')">App2USB</button>
      <button class="btn" onclick="sendPayload('db_backup.bin')">نسخة احتياطية</button>
    </div>
  </div>

  <script>
    function updateStatus(msg, isError = false) {
      const statusDiv = document.getElementById('status');
      statusDiv.innerHTML = msg;
      statusDiv.className = isError ? "status-area log-error" : "status-area log-success";
    }

    async function sendPayload(fileName) {
      const ip = document.getElementById('ps4_ip').value;
      const port = 9020; // المنفذ الافتراضي لـ BinLoader

      updateStatus(`جاري محاولة إرسال ${fileName}...`);

      try {
        // ملاحظة: يجب أن تكون ملفات الـ .bin موجودة فعلياً في مجلد payloads على السيرفر
        const response = await fetch(`payloads/${fileName}`);
        if (!response.ok) throw new Error("الملف غير موجود على السيرفر!");
        
        const buffer = await response.arrayBuffer();

        // محاكاة إرسال البيانات للجهاز
        const xhr = new XMLHttpRequest();
        xhr.open("POST", `http://${ip}:${port}`, true);
        
        xhr.onreadystatechange = function() {
          if (xhr.readyState == 4) {
            updateStatus(`✅ تم إرسال ${fileName} بنجاح! راقب شاشة الـ PS4.`);
          }
        };

        xhr.onerror = function() {
          updateStatus("❌ فشل الاتصال. تأكد من IP الجهاز ومن تفعيل BinLoader.", true);
        };

        xhr.send(buffer);

      } catch (err) {
        updateStatus("خطأ: " + err.message, true);
      }
    }
  </script>
</body>
</html>
