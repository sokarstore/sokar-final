<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS4Sokar | 9.00 Host Menu</title>
  <style>
    :root {
      --gold: #ffcc55;
      --dark-bg: #050505;
      --card-bg: rgba(20, 20, 20, 0.95);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark-bg);
      background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('sokar-logo.png'); /* الصورة التي أرفقتها */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, transparent 20%, var(--dark-bg) 100%);
      z-index: -1;
    }

    .container {
      max-width: 900px;
      width: 95%;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 3.5rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255, 204, 85, 0.5);
      margin-bottom: 5px;
      letter-spacing: 3px;
    }

    .phone-tag {
      background: var(--gold);
      color: black;
      padding: 5px 20px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.2rem;
      display: inline-block;
      margin-bottom: 30px;
      box-shadow: 0 0 15px var(--gold);
    }

    .status-bar {
      background: rgba(0,0,0,0.8);
      border: 1px solid var(--gold);
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .payload-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }

    .btn {
      background: var(--card-bg);
      border: 1px solid rgba(255, 204, 85, 0.3);
      color: white;
      padding: 20px 10px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .btn:hover {
      background: var(--gold);
      color: black;
      transform: translateY(-5px);
      box-shadow: 0 5px 20px rgba(255, 204, 85, 0.4);
      border-color: var(--gold);
    }

    .btn-gold {
      border: 2px solid var(--gold);
      background: rgba(255, 204, 85, 0.1);
      grid-column: span 2;
      font-size: 1.4rem;
    }

    .version-info {
      margin-top: 40px;
      color: #888;
      font-size: 0.9rem;
    }

    footer {
      margin-top: auto;
      padding: 20px;
      color: var(--gold);
      font-weight: bold;
    }

    /* Animation */
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    .loading { animation: pulse 1s infinite; }
  </style>
</head>
