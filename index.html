<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOKAR | Ultimate PS4 Host</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
    body {
      background: radial-gradient(circle at 30% 10%, #0a0f1a, #010101);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .box {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 35px;
      max-width: 1000px;
      width: 100%;
      border: 2px solid #ffcc55;
      text-align: center;
    }
    h1 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #ffdd99, #ffaa33);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .phone {
      background: #ffaa33;
      display: inline-block;
      padding: 12px 35px;
      border-radius: 60px;
      font-size: 1.8rem;
      font-weight: bold;
      color: black;
      margin: 20px 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin: 25px 0;
    }
    .btn {
      background: #111;
      border: 1px solid #ffcc55;
      color: #ffcc55;
      padding: 12px;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .btn:hover {
      background: #ffcc55;
      color: black;
      transform: scale(1.02);
    }
    .console {
      background: #03050a;
      border-radius: 25px;
      padding: 15px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #aaffdd;
      text-align: left;
      height: 150px;
      overflow-y: auto;
    }
    footer {
      margin-top: 25px;
      font-size: 0.7rem;
      color: #888;
    }
  </style>
</head>
<body>
<div class="box">
  <h1>⚡ SOKAR ULTIMATE ⚡</h1>
  <div class="phone">📞 01000291852</div>
  <div class="grid">
    <div class="btn" data-payload="WebRTE">🌐 WebRTE</div>
    <div class="btn" data-payload="PS4debug">🐞 PS4debug</div>
    <div class="btn" data-payload="FTP">📁 FTP</div>
    <div class="btn" data-payload="App2USB">💾 App2USB</div>
    <div class="btn" data-payload="ToDex Enable">✅ ToDex Enable</div>
    <div class="btn" data-payload="ToDex Disable">❌ ToDex Disable</div>
    <div class="btn" data-payload="Kernel Dumper">🧠 Kernel Dumper</div>
    <div class="btn" data-payload="Game Dumper">🎮 Game Dumper</div>
    <div class="btn" data-payload="DB Backup">💽 DB Backup</div>
    <div class="btn" data-payload="Linux">🐧 Linux</div>
    <div class="btn" data-payload="GTAV Mods">🚗 GTAV Mods</div>
    <div class="btn" data-payload="Fan Control">🌀 Fan Control</div>
  </div>
  <div class="console" id="console">> SOKAR Terminal Ready<br>> Press any tool</div>
  <footer>⚔️ SOKAR PREMIUM | Thanks: TheFlow, Al-Azif</footer>
</div>
<script>
  const consoleDiv = document.getElementById('console');
  function addLog(msg) {
    let line = document.createElement('div');
    line.innerHTML = `> ✅ ${msg}`;
    line.style.color = "#aaffaa";
    consoleDiv.appendChild(line);
    line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => {
      let payload = btn.getAttribute('data-payload');
      addLog(`Executing: ${payload} ...`);
      setTimeout(() => addLog(`${payload} completed`), 800);
    });
  });
  addLog("SOKAR Host Activated");
</script>
</body>
</html>
