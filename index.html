<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOKAR HOST v2.0 | PS4 11.00</title>
  <style>
    :root {
      --gold: #ffcc55;
      --dark-bg: #0a0f1a;
      --card-bg: rgba(0, 0, 0, 0.9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: radial-gradient(circle at 30% 10%, #1a1f2c, #010101);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 30px;
      text-align: center;
      border: 2px solid var(--gold);
      box-shadow: 0 0 30px rgba(255, 204, 85, 0.2);
    }

    h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #fff, var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .ip-section {
      margin: 20px 0;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 20px;
    }

    input[type="text"] {
      background: #000;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 1.1rem;
      width: 200px;
      margin-top: 10px;
    }

    .status-box {
      margin: 15px 0;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      min-height: 40px;
      background: #111;
      color: #aaa;
    }

    .payload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin: 25px 0;
    }

    .btn-payload {
      background: linear-gradient(135deg, #222, #111);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 15px;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-payload:hover {
      background: var(--gold);
      color: #000;
      transform: translateY(-3px);
    }

    .btn-payload:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .log-success { color: #55ff55; }
    .log-error { color: #ff5555; }
    .log-info { color: var(--gold); }

    footer {
      margin-top: 20px;
      font-size: 0.8rem;
      border-top: 1px solid #333;
      padding-top: 15px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>⚡ SOKAR PS4 HOST ⚡</h1>
  
  <div class="ip-section">
    <p>أدخل عنوان IP جهاز الـ PS4:</p>
    <input type="text" id="ps4_ip" value="192.168.1.100" placeholder="192.168.x.x">
  </div>

  <div id="status" class="status-box">جاهز لإرسال البايلود...</div>

  <div class="payload-grid">
    <button class="btn-payload" onclick="sendPayload('goldhen.bin')">GoldHEN v2.4b16</button>
    <button class="btn-payload" onclick="sendPayload('ftp.bin')">FTP Server</button>
    <button class="btn-payload" onclick="sendPayload('disable_updates.bin')">Disable Updates</button>
    <button class="btn-payload" onclick="sendPayload('binloader.bin')">Bin Loader</button>
  </div>

  <div style="font-size: 0.8rem; color: #888; background: #221100; padding: 10px; border-radius: 10px;">
    ⚠️ تأكد من تشغيل <b>BinLoader</b> من إعدادات GoldHEN على الـ PS4 أولاً.
  </div>

  <footer>
    SOKAR STORE - Developed for PS4 11.00 <br>
    © 2024 All Rights Reserved
  </footer>
</div>

<script>
  function updateStatus(msg, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.innerHTML = `<span class="log-${type}">${msg}</span>`;
  }

  async function sendPayload(fileName) {
    const ip = document.getElementById('ps4_ip').value;
    const port = 9020;

    if (!ip) {
      updateStatus("خطأ: يرجى إدخال IP الجهاز", "error");
      return;
    }

    updateStatus(`جاري تحميل ${fileName}...`, "info");

    try {
      // 1. جلب ملف البايلود من السيرفر
      // ملاحظة: يجب أن تكون الملفات موجودة في نفس مجلد index.html على GitHub
      const response = await fetch(`payloads/${fileName}`);
      if (!response.ok) throw new Error("لم يتم العثور على ملف البايلود على السيرفر");
      
      const payloadBuffer = await response.arrayBuffer();

      updateStatus(`جاري الاتصال بـ ${ip}:${port}...`, "info");

      // 2. إرسال البايلود عبر Socket
      // ملاحظة: المتصفحات الحديثة تمنع الاتصال المباشر بـ TCP عبر JS لأسباب أمنية
      // لذلك نستخدم تقنية الـ XHR أو Fetch إذا كان هناك Web-API على الـ PS4
      // أو الطريقة التقليدية لـ PS4 Exploit Hosts:
      
      const xhr = new XMLHttpRequest();
      xhr.open("POST", `http://${ip}:${port}`, true);
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState == 4) {
          updateStatus("✅ تم إرسال البايلود بنجاح! افحص جهاز الـ PS4.", "success");
        }
      };

      xhr.onerror = function() {
        // في أغلب الأحيان سيعطي خطأ CORS ولكن البايلود سيصل إذا كان المنفذ مفتوحاً
        updateStatus("⚠️ تم الإرسال (تأكد من شاشة الـ PS4)", "info");
      };

      xhr.send(payloadBuffer);

    } catch (error) {
      updateStatus("خطأ: " + error.message, "error");
    }
  }
</script>

</body>
</html>
