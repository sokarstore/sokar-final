<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS4Sokar Host | GoldHEN & Payloads</title>
  <style>
    :root {
      --gold: #ffcc55;
      --blue: #0072ce;
      --glass: rgba(0, 0, 0, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      /* استخدام الصورة كخلفية كاملة */
      background: url('sokar-logo.png') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* طبقة تعتيم فوق الصورة لضمان وضوح الكلام */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    header {
      text-align: center;
      padding: 30px;
      width: 100%;
    }

    .brand-title {
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 5px;
      background: linear-gradient(to bottom, #fff, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 5px 15px rgba(0,0,0,0.5);
      margin-bottom: 5px;
    }

    .phone-bar {
      background: var(--gold);
      color: #000;
      padding: 5px 20px;
      border-radius: 50px;
      font-weight: bold;
      display: inline-block;
      margin-top: 10px;
      box-shadow: 0 0 20px rgba(255, 204, 85, 0.4);
    }

    .container {
      max-width: 1000px;
      width: 95%;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 30px;
      margin-bottom: 50px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .status-area {
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 25px;
      padding: 15px;
      border-bottom: 1px solid #333;
      color: var(--gold);
    }

    /* تقسيم البايلودات لمجموعات مثل صفحة PS4Idea */
    .section-title {
      color: #fff;
      border-right: 4px solid var(--gold);
      padding-right: 15px;
      margin: 20px 0;
      font-size: 1.4rem;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .btn {
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      border: 1px solid #444;
      color: white;
      padding: 18px 10px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .btn:hover {
      border-color: var(--gold);
      transform: scale(1.05);
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 20px rgba(255, 204, 85, 0.3);
    }

    .btn-goldhen {
      border: 2px solid var(--gold);
      background: rgba(255, 204, 85, 0.1);
    }

    .info-footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: #888;
      width: 100%;
    }

    /* للموبايل */
    @media (max-width: 600px) {
      .brand-title { font-size: 2rem; }
      .grid-container { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand-title">PS4Sokar</div>
    <div class="phone-bar">📞 01000291852</div>
  </header>

  <div class="container">
    <div id="status" class="status-area">إختر النسخة المطلوبة لبدء التعديل...</div>

    <h2 class="section-title">إصدارات GoldHEN</h2>
    <div class="grid-container">
      <button class="btn btn-goldhen" onclick="loadPayload('goldhen_2.4b16.bin')">GoldHEN v2.4b16</button>
      <button class="btn btn-goldhen" onclick="loadPayload('goldhen_2.3.bin')">GoldHEN v2.3</button>
      <button class="btn btn-goldhen" onclick="loadPayload('goldhen_2.2.4.bin')">GoldHEN v2.2.4</button>
    </div>

    <h2 class="section-title">أدوات النظام (System Tools)</h2>
    <div class="grid-container">
      <button class="btn" onclick="loadPayload('ftp.bin')">FTP Server</button>
      <button class="btn" onclick="loadPayload('binloader.bin')">Bin Loader</button>
      <button class="btn" onclick="loadPayload('app2usb.bin')">App2USB</button>
      <button class="btn" onclick="loadPayload('disable_updates.bin')">إيقاف التحديثات</button>
      <button class="btn" onclick="loadPayload('enable_updates.bin')">تفعيل التحديثات</button>
    </div>

    <h2 class="section-title">أدوات متقدمة (Advanced)</h2>
    <div class="grid-container">
      <button class="btn" onclick="loadPayload('todex.bin')">To-DEX</button>
      <button class="btn" onclick="loadPayload('webrte.bin')">WebRTE</button>
      <button class="btn" onclick="loadPayload('ps4debug.bin')">PS4Debug</button>
      <button class="btn" onclick="loadPayload('history_blocker.bin')">History Blocker</button>
      <button class="btn" onclick="loadPayload('backup.bin')">DB Backup</button>
    </div>
  </div>

  <footer class="info-footer">
    PS4Sokar Host - Created with ⚡ for the PS4 Community <br>
    Support: 01000291852 | Special Thanks to: Al-Azif, Karo, Sistro
  </footer>

  <script>
    // وظيفة محاكاة تحميل البايلود كما في صفحة 900
    function loadPayload(name) {
      const status = document.getElementById('status');
      status.innerHTML = `<span style="color: #fff;">جاري تحميل: </span> ${name} ...`;
      
      // هنا تضع كود الإرسال الفعلي (الذي طورناه سابقاً)
      // للتبسيط الآن سنظهر رسالة نجاح بعد ثانيتين
      setTimeout(() => {
        status.innerHTML = `✅ تم تفعيل <span style="color: #fff;">${name}</span> بنجاح!`;
      }, 2000);
    }

    // كشف التخزين المؤقت (Offline Cache)
    window.onload = function() {
      if (window.applicationCache) {
        window.applicationCache.addEventListener('updateready', function() {
          if (window.applicationCache.status == window.applicationCache.UPDATEREADY) {
            window.location.reload();
          }
        });
      }
    };
  </script>

</body>
</html>
