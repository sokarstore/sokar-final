<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOKAR PS4 - Redirect Exploit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 30% 10%, #0a0f1a, #020408);
      font-family: 'Segoe UI', system-ui;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      max-width: 650px;
      width: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(18px);
      border-radius: 56px;
      padding: 40px 30px;
      text-align: center;
      border: 2px solid #ffcc55;
    }
    h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #ffdd99, #ffaa33);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }
    .phone {
      background: linear-gradient(135deg, #ffcc66, #ffaa33);
      display: inline-block;
      padding: 12px 30px;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #0a0a0a;
      margin: 20px 0;
    }
    .exploit-btn {
      background: #ffcc55;
      color: #0a0a0a;
      border: none;
      padding: 18px 40px;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: 60px;
      cursor: pointer;
      margin: 15px 0;
      width: 100%;
      transition: 0.2s;
    }
    .exploit-btn:hover {
      transform: scale(1.02);
      background: #ffdd77;
    }
    .note {
      color: #aaa;
      font-size: 0.7rem;
      margin-top: 25px;
    }
    footer {
      margin-top: 25px;
      font-size: 0.7rem;
      color: #666;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>⚡ SOKAR PS4 ⚡</h1>
  <div class="phone">📞 01000291852</div>
  <p style="margin-bottom: 15px; color: #ffcc66;">اضغط الزر لتفعيل التعديل على PS4</p>
  
  <button class="exploit-btn" id="exploitBtn">🔥 تشغيل GoldHEN 🔥</button>
  
  <div class="note">
    ⚠️ مخصص لـ PS4 Firmware 9.00 و 11.00 فقط<br>
    بعد الضغط، انتظر 30 ثانية عشان التعديل يشتغل
  </div>
  <footer>⚔️ SOKAR HOST | Exploit Source: chefkeks.online</footer>
</div>

<script>
  const exploitBtn = document.getElementById('exploitBtn');
  
  // كشف الجهاز
  const isPS4 = navigator.userAgent.includes('PlayStation') || 
                navigator.userAgent.includes('PS4') || 
                window.location.href.includes('ps4');
  
  if (!isPS4) {
    exploitBtn.innerText = '⚠️ افتح على PS4 عشان يشتغل';
    exploitBtn.style.background = '#555';
    exploitBtn.style.cursor = 'not-allowed';
    exploitBtn.disabled = true;
  }
  
  exploitBtn.addEventListener('click', () => {
    if (!isPS4) return;
    
    exploitBtn.innerText = '⏳ جاري تشغيل التعديل...';
    exploitBtn.disabled = true;
    
    // استخدام موقع chefkeks (شغال حالياً على 9.00 و 11.00)
    window.location.href = 'https://chefkeks.online/PS4/900/';
    
    // لو الموقع الأول مش شغال، جرب ده:
    // window.location.href = 'https://karoooo.com/900/';
  });
</script>
</body>
</html>
